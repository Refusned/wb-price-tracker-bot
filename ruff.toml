# Линтер настроен на высокий сигнал: ловим реальные ошибки (pyflakes + синтаксис),
# не воюем со стилем. Набор правил можно расширять по мере готовности кода.
target-version = "py311"
line-length = 120

[lint]
select = ["E9", "F", "B"]
# B008: вызов в дефолтах аргументов — в aiogram-хендлерах это норма.
ignore = ["B008"]

[lint.per-file-ignores]
# В тестах локальные присваивания ради читабельности — это нормально.
"tests/*" = ["F841"]
